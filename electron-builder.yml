appId: com.eladbenhaim.yt-music-wrapper
productName: YT Music
copyright: Copyright © 2026 Elad Ben Haim

asar: true
compression: maximum
afterPack: build/afterPack.js

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*
  - native/spotlight/*.node
  - "!src/**/*"
  - "!**/*.ts"
  - "!**/*.map"
  - "!tsconfig.json"
  - "!.bdd/**/*"
  - "!scripts/**/*"
  - "!native/spotlight/target/**/*"
  - "!native/spotlight/src/**/*"
  - "!native/spotlight/Cargo.*"
  - "!native/spotlight/build.rs"

mac:
  icon: assets/icon.icns
  category: public.app-category.music
  target:
    - target: dmg
  darkModeSupport: true
  protocols:
    - name: YT Music
      schemes:
        - ytmusic
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSAppleMusicUsageDescription: "YT Music needs access to play media content."

dmg:
  artifactName: "YT-Music-${version}-${arch}.dmg"
