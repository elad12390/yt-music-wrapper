appId: com.eladbenhaim.yt-music-wrapper
productName: YT Music
copyright: Copyright © 2026 Elad Ben Haim

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*
  - native/spotlight/*.node
  - "!src/**/*"
  - "!**/*.ts"
  - "!tsconfig.json"

mac:
  icon: assets/icon.icns
  category: public.app-category.music
  target:
    - target: dmg
    - target: zip
  darkModeSupport: true
  protocols:
    - name: YT Music
      schemes:
        - ytmusic
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSAppleMusicUsageDescription: "YT Music needs access to play media content."

dmg:
  artifactName: "YT-Music-${version}-${arch}.dmg"

zip:
  artifactName: "YT-Music-${version}-${arch}.zip"
