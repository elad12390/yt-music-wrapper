name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm install

      - name: Build native addon (arm64)
        run: |
          cd native/spotlight
          cargo build --release --target aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/libspotlight.dylib spotlight.darwin-arm64.node

      - name: Build native addon (x64)
        run: |
          cd native/spotlight
          cargo build --release --target x86_64-apple-darwin
          cp target/x86_64-apple-darwin/release/libspotlight.dylib spotlight.darwin-x64.node

      - name: Build TypeScript
        run: npx tsc

      - name: Get version
        id: version
        run: echo "version=v$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          # Extract section for current version from CHANGELOG.md
          NOTES=$(awk "/^## \[?${VERSION}\]?/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md 2>/dev/null || echo "Release ${VERSION}")
          if [ -z "$NOTES" ]; then
            NOTES="Release ${VERSION}"
          fi
          # Write to file to handle multiline
          echo "$NOTES" > /tmp/release-notes.txt

      - name: Package app
        run: npx electron-builder --mac --arm64 --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body_path: /tmp/release-notes.txt
          files: |
            release/*.dmg
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
