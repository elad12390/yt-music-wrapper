name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Check if version changed
        id: check
        run: |
          VERSION="v$(node -p 'require("./package.json").version')"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm install

      - name: Build native addon (arm64)
        if: steps.check.outputs.skip == 'false'
        working-directory: native/spotlight
        run: |
          cargo build --release --target aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/libspotlight.dylib spotlight.darwin-arm64.node

      - name: Build native addon (x64)
        if: steps.check.outputs.skip == 'false'
        working-directory: native/spotlight
        run: |
          cargo build --release --target x86_64-apple-darwin
          cp target/x86_64-apple-darwin/release/libspotlight.dylib spotlight.darwin-x64.node

      - name: Build TypeScript
        if: steps.check.outputs.skip == 'false'
        run: npx tsc

      - name: Build DMG (arm64)
        if: steps.check.outputs.skip == 'false'
        run: ./scripts/build-dmg.sh arm64

      - name: Build DMG (x64)
        if: steps.check.outputs.skip == 'false'
        run: ./scripts/build-dmg.sh x64

      - name: Generate release notes
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          PREV_TAG=$(git tag --sort=-v:refname | head -1)

          {
            echo "## What's Changed"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges
            else
              git log --pretty=format:"- %s" --no-merges
            fi

            echo ""
            echo ""

            CHANGELOG_SECTION=$(awk "/^## \[?${VERSION}\]?/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md 2>/dev/null || true)
            if [ -n "$CHANGELOG_SECTION" ]; then
              echo "## Release Notes"
              echo ""
              echo "$CHANGELOG_SECTION"
            fi
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.version }}
          name: YT Music ${{ steps.check.outputs.version }}
          body_path: /tmp/release-notes.md
          files: |
            release/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
