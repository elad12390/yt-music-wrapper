name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Click on...
        3. See error
  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - DMG from Releases
        - Built from source
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 15.3 (arm64)"
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: "e.g. 1.0.1"
